<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compilazione Form</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h1>Compila il seguente Form</h1>
    
    <form action="" id="mioForm" method="get" novalidate>

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome"><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"> <br>

        <label for="eta">Età:</label>
        <input type="number" id="eta" name="eta"> <br>

        <label for="nazionalita">Nazionalità:</label>
        <select name="nazionalita" id="nazionalita">
            <option value="" disabled selected>Seleziona...</option>
            <option value="ITA"> Italiana </option>
            <option value="FRA"> Francese </option>
            <option value="GER"> Tedesca </option>
            <option value="ENG"> Inglese </option>
        </select> <br>

        <button type="submit">Invia</button>
        <!-- <input type="submit" value="Invia"> -->
    </form>

    <div id="validationWarns"></div>

    <hr>

    <div id="demo"></div>


    <script src="./js/script04.js"></script>
</body>
</html>
